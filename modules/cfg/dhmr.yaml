enabled: false

border_refinement:
  enabled: false
  feature_dim: 256
  hidden_dim: 256
  num_layers: 2
  border_points_per_side: 5
  max_delta: 0.25
  max_gt_per_image: 16
  max_points_per_gt: 2
  max_points_per_batch: 128
  min_observations: 2
  min_instability: 0.0
  target_transitions: ["FN_LOC->FN_LOC", "TP->FN_LOC"]
  start_epoch: 1
  warmup_epochs: 0
  detach_boxes: true
  giou_loss_weight: 0.2
  residual_loss_weight: 0.1
  quality_loss_weight: 0.1
  smooth_l1_beta: 0.1
  target_delta_clip: 1.0

models:
  fcos: {}
  fasterrcnn:
    enabled: false
  dino:
    enabled: false
