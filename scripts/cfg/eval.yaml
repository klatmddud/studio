device: auto
amp: false
output_dir: runs/eval

data:
  images: path/to/your/validation/image/folder # ex) C:/Users/user/datasets/coco/images/val2017
  annotations: path/to/your/validation/annotation/json/file # ex) C:/Users/user/datasets/coco/annotations/instances_val2017.json

loader:
  batch_size: 16
  num_workers: 8
  pin_memory: true
  shuffle: false

checkpoint:
  path: runs/train/checkpoints/best.pt

metrics:
  type: coco_detection
  iou_types: [bbox]
  primary: bbox_mAP_50_95

eval:
  log_interval: 20
  save_predictions: false
  predictions_path: null
