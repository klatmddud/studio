enabled: false
record_match_threshold: 0.95
max_records: null

mining:
  enabled: true
  mode: epoch_end_full_train
  mine_interval: 1
  warmup_epochs: 0

  matching:
    tau_iou: 0.5
    tau_tp: 0.3
    tau_near: 0.3
    tau_bg_score: 0.1
    tau_cls_evidence: 0.3
    tau_loc_score: 0.3

scoring:
  min_observations: 3
  forgetting_weight: 0.35
  fn_rate_weight: 0.25
  fn_streak_weight: 0.2
  type_switch_weight: 0.15
  recent_fn_weight: 0.05
  stable_tp_discount: 0.2
  streak_norm_epochs: 5
  ema_momentum: 0.8
  min_instability: 0.0
  max_instability: 1.0
  stable_tp_rate: 0.8
  persistent_fn_rate: 0.8
  oscillator_switches: 2
  late_learner_min_epoch_gap: 3

loss_weighting:
  enabled: false
  min_instability: 0.5
  cls_weight: 1.0
  box_weight: 1.0
  ctr_weight: 1.0
  max_weight: 2.0
  use_failure_type_scales: true
  failure_type_scales:
    FN_BG:
      cls: 1.0
      box: 0.25
      ctr: 0.5
    FN_CLS:
      cls: 1.0
      box: 0.25
      ctr: 0.25
    FN_LOC:
      cls: 0.25
      box: 1.0
      ctr: 1.0
    FN_MISS:  
      cls: 1.0
      box: 0.5
      ctr: 0.5

assignment_expansion:
  enabled: false
  target_failure_types: [FN_BG]
  min_observations: 2
  min_instability: 0.35
  radius_multiplier: 1.75
  radius_max: 3.0
  backup_topk: 3
  max_extra_positive_ratio: 0.2

models:
  fcos: {}
  fasterrcnn:
    enabled: false
  dino:
    enabled: false
