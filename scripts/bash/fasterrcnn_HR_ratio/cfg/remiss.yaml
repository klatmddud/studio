enabled: true
start_epoch: 6
max_records: null

mining:
  type: offline
  start_epoch: 6
  interval_epoch: 5

matching:
  score_threshold: auto
  iou_threshold: auto

target:
  miss_threshold: 2
  aggregation: miss_count

loss_weight:
  enabled: false
  start_epoch: null
  hard_replay_only: true
  alpha: 0.5
  max_weight: 2.0
  min_miss_count: 1
  min_observations: 1
  normalize_batch_mean: true

models:
  fcos: {}
  fasterrcnn: {}
  dino:
    enabled: false
