seed: 42
device: auto
amp: false
output_dir: runs/train

data:
  train_images: path/to/your/train/image/folder # ex) C:/Users/user/datasets/coco/images/train2017
  train_annotations: path/to/your/train/annotation/json/file # ex) C:/Users/user/datasets/coco/annotations/instances_train2017.json
  val_images: path/to/your/validation/image/folder # ex) C:/Users/user/datasets/coco/images/val2017
  val_annotations: path/to/your/validation/annotation/json/file # ex) C:/Users/user/datasets/coco/annotations/instances_val2017.json

loader:
  batch_size: 16
  num_workers: 8
  pin_memory: true
  shuffle: true

optimizer:
  name: sgd
  lr: 0.005
  momentum: 0.9
  weight_decay: 0.0005
  nesterov: false

scheduler:
  name: multistep
  milestones: [8, 11]
  gamma: 0.1

train:
  epochs: 50
  grad_clip_norm: 1.0
  log_interval: 20
  eval_every_epochs: 5

checkpoint:
  dir: checkpoints
  resume: null
  save_last: true
  save_best: true
  monitor: bbox_mAP_50_95
  mode: max

metrics:
  type: coco_detection
  iou_types: [bbox]
  primary: bbox_mAP_50_95
