device: auto
amp: false
output_dir: runs/eval

data:
  images: ${KITTI_VAL_IMAGES} # ex) ${BDD100K_VAL_IMAGES}, ${BDD10K_VAL_IMAGES}
  annotations: ${KITTI_VAL_ANNOTATIONS} # ex) ${BDD100K_VAL_ANNOTATIONS}, ${BDD10K_VAL_ANNOTATIONS}

loader:
  batch_size: 16
  num_workers: 8
  pin_memory: true
  shuffle: false

checkpoint:
  path: runs/train/checkpoints/best.pt

metrics:
  type: coco_detection
  iou_types: [bbox]
  primary: bbox_mAP_50_95

eval:
  log_interval: 20
  save_predictions: false
  predictions_path: null
