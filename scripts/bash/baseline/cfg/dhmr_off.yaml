enabled: false

hlrt:
  enabled: false
  min_observations: 3
  min_fn_loc_count: 2
  min_instability: 0.25
  max_gt_per_image: 16
  start_epoch: 1
  warmup_epochs: 2
  residual_memory:
    enabled: true
    ema_momentum: 0.8
    min_edge_observations: 1
    max_points_per_gt: 4
    max_points_per_batch: 128
    target_delta_clip: 2.0
  residual_replay:
    enabled: false
    max_points_per_gt: 2
    max_points_per_batch: 64
    tau_near: 0.3
    tau_iou: 0.5
    residual_scale: 1.0
    max_residual_scale: 3.0
    scale_step: 1.25
    center_radius_multiplier: 1.5
    require_iou_window: true
  iou_loss_weighting:
    enabled: false
    gamma: 0.25
    max_weight: 2.0
  side_aware_loss:
    enabled: false
    loss_weight: 0.1
    smooth_l1_beta: 0.1
    use_residual_edge_weights: true
    use_dominant_edge_mask: true
    non_dominant_edge_weight: 0.5
    min_edge_weight: 0.25
    max_edge_weight: 2.0
    instability_gamma: 1.0
  quality_gate:
    enabled: false
    blend: 0.5
    min_quality: 0.05
    max_quality: 1.0

models:
  fcos: {}
  fasterrcnn:
    enabled: false
  dino:
    enabled: false
