seed: 42
device: auto
amp: false
output_dir: runs/train

data:
  train_images: ${KITTI_TRAIN_IMAGES} # ex) ${BDD100K_TRAIN_IMAGES}, ${BDD10K_TRAIN_IMAGES}
  train_annotations: ${KITTI_TRAIN_ANNOTATIONS} # ex) ${BDD100K_TRAIN_ANNOTATIONS}, ${BDD10K_TRAIN_ANNOTATIONS}
  val_images: ${KITTI_VAL_IMAGES} # ex) ${BDD100K_VAL_IMAGES}, ${BDD10K_VAL_IMAGES}
  val_annotations: ${KITTI_VAL_ANNOTATIONS} # ex) ${BDD100K_VAL_ANNOTATIONS}, ${BDD10K_VAL_ANNOTATIONS}

loader:
  batch_size: 32
  num_workers: 8
  pin_memory: true
  shuffle: true

optimizer:
  name: sgd
  lr: 0.005
  momentum: 0.9
  weight_decay: 0.0005
  nesterov: false

scheduler:
  name: multistep
  milestones: [8, 11]
  gamma: 0.1

train:
  epochs: 20
  grad_clip_norm: 1.0
  log_interval: 20
  eval_every_epochs: 1
  hard_replay:
    enabled: false
    start_epoch: 3
    warmup_epochs: 0
    max_ratio: 0.25
    max_replays_per_batch: 0
    beta: 1.0
    temperature: 1.0
    max_image_weight: 5.0
    min_replay_weight: 1.0
    replacement: true
    max_replays_per_gt_per_epoch: 4
    replay_recency_window: 3
    target_transitions:
      - FN_BG->FN_BG
      - FN_CLS->FN_CLS
      - FN_LOC->FN_LOC
      - FN_MISS->FN_MISS
      - TP->FN_BG
      - TP->FN_CLS
      - TP->FN_LOC
      - TP->FN_MISS
    persistent_states:
      - FN_BG
      - FN_CLS
      - FN_LOC
      - FN_MISS
    min_observations: 2
    min_fn_streak: 2
    loc_repair:
      enabled: true
      replay_fraction: 0.6
      context_scale: 2.0
      context_scale_jitter: 0.25
      center_jitter: 0.10
      min_crop_size: 128
      min_visible_ratio: 0.50
      focus_min_visible_ratio: 0.90
      include_other_gt: true
      target_transitions:
        - FN_LOC->FN_LOC
        - TP->FN_LOC
      persistent_states:
        - FN_LOC

checkpoint:
  dir: checkpoints
  resume: null
  save_last: true
  save_best: true
  monitor: bbox_mAP_50_95
  mode: max

metrics:
  type: coco_detection
  iou_types: [bbox]
  primary: bbox_mAP_50_95
