backbone:
  name: resnet50
  pretrained: DEFAULT
  trainable_layers: 3
  dilation: false
  return_interm_indices: [1, 2, 3]

neck:
  type: input_proj
  num_feature_levels: 4
  norm: groupnorm

position_embedding:
  type: sine
  num_pos_feats: 128
  temperature: 10000
  normalize: true
  offset: -0.5

transformer:
  hidden_dim: 256
  nheads: 8
  encoder_layers: 6
  decoder_layers: 6
  dim_feedforward: 2048
  dropout: 0.0
  activation: relu
  enc_n_points: 4
  dec_n_points: 4
  with_box_refine: true
  two_stage: true

queries:
  num_queries: 300
  num_patterns: 0

denoising:
  enabled: true
  num_denoising: 100
  label_noise_ratio: 0.5
  box_noise_scale: 1.0

matcher:
  class_cost: 2.0
  bbox_cost: 5.0
  giou_cost: 2.0

loss:
  aux_loss: true
  focal_alpha: 0.25
  focal_gamma: 2.0
  class_weight: 1.0
  bbox_weight: 5.0
  giou_weight: 2.0
  no_object_weight: 0.1

inference:
  topk: 300
  score_thresh: 0.0
  use_nms: false
  nms_thresh: 0.5

num_classes: 9

transform:
  min_size: 800
  max_size: 1333
  image_mean: [0.485, 0.456, 0.406]
  image_std: [0.229, 0.224, 0.225]
  size_divisible: 32