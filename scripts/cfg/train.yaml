seed: 42
device: auto
amp: false
output_dir: runs/train

data:
  train_images: ${KITTI_TRAIN_IMAGES} # ex) ${BDD100K_TRAIN_IMAGES}, ${BDD10K_TRAIN_IMAGES}
  train_annotations: ${KITTI_TRAIN_ANNOTATIONS} # ex) ${BDD100K_TRAIN_ANNOTATIONS}, ${BDD10K_TRAIN_ANNOTATIONS}
  val_images: ${KITTI_VAL_IMAGES} # ex) ${BDD100K_VAL_IMAGES}, ${BDD10K_VAL_IMAGES}
  val_annotations: ${KITTI_VAL_ANNOTATIONS} # ex) ${BDD100K_VAL_ANNOTATIONS}, ${BDD10K_VAL_ANNOTATIONS}

loader:
  batch_size: 32
  num_workers: 8
  pin_memory: true
  shuffle: true

optimizer:
  name: sgd
  lr: 0.005
  momentum: 0.9
  weight_decay: 0.0005
  nesterov: false

scheduler:
  name: multistep
  milestones: [8, 11]
  gamma: 0.1

train:
  epochs: 20
  grad_clip_norm: 1.0
  log_interval: 20
  eval_every_epochs: 1
  hard_crop_second_view:
    enabled: false
    start_epoch: 3
    loss_weight: 0.25
    max_views_per_image: 1
    max_views_per_batch: 8
    crop_scale_min: 1.6
    crop_scale_max: 2.4
    jitter: 0.15
    min_crop_size: 96
    include_other_gt: true
    min_box_size: 2.0
    target_transitions:
      - FN_LOC->FN_LOC
      - TP->FN_LOC
    persistent_states:
      - FN_LOC
    min_observations: 2
    min_fn_streak: 2

checkpoint:
  dir: checkpoints
  resume: null
  save_last: true
  save_best: true
  monitor: bbox_mAP_50_95
  mode: max

metrics:
  type: coco_detection
  iou_types: [bbox]
  primary: bbox_mAP_50_95
