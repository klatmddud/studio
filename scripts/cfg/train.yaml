seed: 42
device: auto
amp: false
output_dir: runs/train

data:
  train_images: ${KITTI_TRAIN_IMAGES} # ex) ${BDD100K_TRAIN_IMAGES}, ${BDD10K_TRAIN_IMAGES}
  train_annotations: ${KITTI_TRAIN_ANNOTATIONS} # ex) ${BDD100K_TRAIN_ANNOTATIONS}, ${BDD10K_TRAIN_ANNOTATIONS}
  val_images: ${KITTI_VAL_IMAGES} # ex) ${BDD100K_VAL_IMAGES}, ${BDD10K_VAL_IMAGES}
  val_annotations: ${KITTI_VAL_ANNOTATIONS} # ex) ${BDD100K_VAL_ANNOTATIONS}, ${BDD10K_VAL_ANNOTATIONS}

loader:
  batch_size: 32
  num_workers: 8
  pin_memory: true
  shuffle: true

optimizer:
  name: sgd
  lr: 0.005
  momentum: 0.9
  weight_decay: 0.0005
  nesterov: false

scheduler:
  name: multistep
  milestones: [16, 22]
  gamma: 0.1

train:
  epochs: 24
  grad_clip_norm: 1.0
  log_interval: 20
  eval_every_epochs: 1

checkpoint:
  dir: checkpoints
  resume: null
  save_last: true
  save_best: true
  save_every_epochs: 20
  monitor: bbox_mAP_50_95
  mode: max

metrics:
  type: coco_detection
  iou_types: [bbox]
  primary: bbox_mAP_50_95
