enabled: true

htm:
  enabled: true
  mode: epoch_end_full_train
  mine_interval: 1
  warmup_epochs: 0

  matching:
    tau_iou: 0.5
    tau_tp: 0.3
    tau_near: 0.3
    tau_bg_score: 0.1
    tau_cls_evidence: 0.3
    tau_loc_score: 0.3

  transition:
    transition_window: 3
    max_transitions_per_gt: 1
    allowed_fn_types: [FN_BG, FN_CLS, FN_MISS]
    min_direction_norm: 1.0e-6
    lambda_gap: 2.0

tdb:
  enabled: false

  storage:
    max_entries_per_class: 128
    max_entries_per_gt: 1
    store_z_fn: false
    store_z_tp: false
    store_on_cpu: true
    dtype: float32

  filtering:
    allowed_fn_types: [FN_BG, FN_CLS, FN_MISS]
    min_quality: 0.0
    min_direction_norm: 1.0e-6
    renormalize_direction: true

  prototype:
    retrieval: topk
    tau_proto: 0.2
    min_entries_for_query: 1
    min_prototype_norm: 1.0e-6
    use_age_decay: false
    tau_age: 10
    use_failure_type_query: false
    min_type_entries_for_query: 4

tcs:
  enabled: false
  selection_mode: current_hard

  memory_gate:
    require_tdb_direction: true
    use_failure_type_query: false

  hardness:
    source: assigned_cls_confidence
    tau_hard: 0.5
    include_centerness: true
    include_missing_assignment: true

  budget:
    max_candidates_per_image: 8
    max_candidates_per_batch: 32
    rank_by: hardness

  weighting:
    use_candidate_weight: false
    min_weight: 0.25
    max_weight: 1.0

tal:
  enabled: false
  variant: anchor_shift

  loss:
    lambda_tal: 0.05
    alpha: 0.2
    reduction: mean

  schedule:
    start_epoch: 1
    lambda_warmup_epochs: 2

  features:
    input_dim: 256
    projector_dim: 256
    roi_output_size: 7
    roi_sampling_ratio: 2
    normalize: true

  safety:
    skip_invalid_direction: true
    min_direction_norm: 1.0e-6
    skip_invalid_bbox: true

models:
  fcos: {}
  fasterrcnn:
    enabled: false
  dino:
    enabled: false
