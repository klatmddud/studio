enabled: false
grid_size: 2
start_epoch: 1
max_records: null

mining:
  type: online

matching:
  score_threshold: auto
  iou_threshold: auto

target:
  miss_threshold: 2
  aggregation: miss_count

miss_head:
  enabled: false
  start_epoch: 1
  grid_size: 2
  in_channels: 256
  hidden_dim: 256
  num_layers: 2
  dropout: 0.0
  pooling: gap
  level_aggregation: mean
  loss_weight: 0.1
  ignore_none_loss: false
  none_loss_weight: 1.0
  class_balanced_loss: false

models:
  fcos: {}
  fasterrcnn:
    enabled: false
  dino:
    enabled: false
