enabled: true
record_match_threshold: 0.95
max_records: null

mining:
  enabled: true
  mode: epoch_end_full_train
  mine_interval: 1
  warmup_epochs: 0

  matching:
    tau_iou: 0.5
    tau_tp: 0.3
    tau_near: 0.3
    tau_bg_score: 0.1
    tau_cls_evidence: 0.3
    tau_loc_score: 0.3

scoring:
  min_observations: 3
  forgetting_weight: 0.35
  fn_rate_weight: 0.25
  fn_streak_weight: 0.2
  type_switch_weight: 0.15
  recent_fn_weight: 0.05
  stable_tp_discount: 0.2
  streak_norm_epochs: 5
  ema_momentum: 0.8
  min_instability: 0.0
  max_instability: 1.0
  stable_tp_rate: 0.8
  persistent_fn_rate: 0.8
  oscillator_switches: 2
  late_learner_min_epoch_gap: 3

models:
  fcos: {}
  fasterrcnn:
    enabled: false
  dino:
    enabled: false
